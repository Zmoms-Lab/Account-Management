<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CĐB Account Hub — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#ED217C; --brand-dark:#C4145F; --brand-tint:#FDECF4; --brand-tint2:#FBD9E9;
  --ink:#1E1622; --muted:#7A7280; --bg:#F6F4F8; --surface:#FFFFFF; --border:#ECE6F0;
  --ok:#1F9D6B; --warn:#E0912F; --info:#2E86C1; --lost:#B0AAB6;
  --shadow:0 1px 2px rgba(30,22,34,.04), 0 6px 24px rgba(30,22,34,.05);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#dcd6e2;border-radius:20px;border:3px solid var(--bg)}

/* ---------- shell ---------- */
.app{display:grid;grid-template-columns:248px 1fr;height:100vh}
.sidebar{background:linear-gradient(180deg,#2A1520 0%, #1E1622 100%);color:#fff;display:flex;flex-direction:column;padding:18px 14px;gap:6px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.brand img{width:40px;height:40px;border-radius:11px;background:#fff;padding:3px}
.brand b{font-size:15px;font-weight:800;letter-spacing:.2px;line-height:1.1}
.brand span{display:block;font-size:10.5px;color:#c9a9bb;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:#8b7d87;padding:12px 10px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:#d9d2df;font-weight:500;font-size:13.5px;border:0;background:none;width:100%;text-align:left;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(237,33,124,.45)}
.nav-item .ic{width:18px;text-align:center;font-size:15px;opacity:.95}
.nav-item .badge{margin-left:auto;background:rgba(255,255,255,.16);font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600}
.nav-item.active .badge{background:rgba(255,255,255,.25)}

.main{overflow-y:auto;height:100vh}
.topbar{position:sticky;top:0;z-index:20;background:rgba(246,244,248,.85);backdrop-filter:blur(8px);display:flex;align-items:center;gap:16px;padding:16px 28px;border-bottom:1px solid var(--border)}
.search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 13px;color:var(--muted)}
.search input{border:0;outline:0;flex:1;font-family:inherit;font-size:13.5px;color:var(--ink);background:none}
.who{margin-left:auto;display:flex;align-items:center;gap:10px}
.who .av{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
.who small{color:var(--muted);display:block;font-size:11.5px}
.content{padding:26px 28px 60px}

/* ---------- headers ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.page-head h1{margin:0;font-size:23px;font-weight:800;letter-spacing:-.3px}
.page-head p{margin:3px 0 0;color:var(--muted);font-size:13.5px}
.btn{border:1px solid var(--border);background:var(--surface);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:#dccfd7}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}

/* ---------- cards ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}

/* stat cards */
.stats{grid-template-columns:repeat(4,1fr)}
.stat{padding:18px 18px 16px;position:relative;overflow:hidden}
.stat .lab{color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:8px}
.stat .lab .dot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;background:var(--brand-tint);color:var(--brand)}
.stat .num{font-size:30px;font-weight:800;margin-top:10px;letter-spacing:-1px}
.stat .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.stat.accent{background:linear-gradient(135deg,var(--brand),#F0568F);color:#fff;border:0}
.stat.accent .lab,.stat.accent .sub{color:rgba(255,255,255,.9)}
.stat.accent .lab .dot{background:rgba(255,255,255,.2);color:#fff}

/* charts */
.charts{grid-template-columns:1.4fr 1fr}
.chart-card{padding:18px 20px}
.chart-card h3{margin:0 0 14px;font-size:14.5px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:12px;margin:9px 0;font-size:12.5px}
.bar-row .nm{width:98px;color:var(--muted);flex-shrink:0}
.bar-track{flex:1;background:var(--bg);border-radius:20px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;background:var(--brand);transition:width .8s cubic-bezier(.2,.7,.3,1)}
.bar-row .val{width:26px;text-align:right;font-weight:700;font-size:12px}
.donut-wrap{display:flex;align-items:center;gap:18px}
.legend{font-size:12px;display:flex;flex-direction:column;gap:7px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:7px}

/* filter bar */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:center}
.filters select,.filters .fsearch{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:13px;color:var(--ink);outline:0}
.filters select:focus,.filters .fsearch:focus{border-color:var(--brand)}
.filters .fsearch{min-width:200px}
.chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.count-note{margin-left:auto;color:var(--muted);font-size:12.5px}

/* project cards */
.proj-grid{grid-template-columns:repeat(3,1fr)}
.proj{overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
.proj:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(30,22,34,.1);border-color:var(--brand-tint2)}
.proj .cover{height:112px;background:var(--brand-tint);position:relative;display:grid;place-items:center;font-size:34px;color:var(--brand)}
.proj .body{padding:14px 15px 15px;flex:1;display:flex;flex-direction:column;gap:8px}
.proj .body h4{margin:0;font-size:14.5px;font-weight:700;line-height:1.3}
.proj .meta{color:var(--muted);font-size:12px;display:flex;flex-wrap:wrap;gap:6px 10px;margin-top:auto}
.proj .meta b{color:var(--ink);font-weight:600}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
.tbl-wrap{overflow:hidden}
thead th{text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);background:#faf8fb;position:sticky;top:0}
tbody td{padding:12px 16px;border-bottom:1px solid var(--border)}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--brand-tint)}
tbody tr:last-child td{border-bottom:0}
.hosp-name{font-weight:600}
.mini{color:var(--muted);font-size:11.5px}

/* progress */
.prog-track{background:var(--bg);border-radius:20px;height:8px;overflow:hidden;width:120px;display:inline-block;vertical-align:middle}
.prog-fill{height:100%;background:var(--brand);border-radius:20px}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:start}
.kcol{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;min-height:120px}
.kcol h4{margin:2px 4px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.kcol h4 span{background:var(--bg);color:var(--muted);border-radius:20px;font-size:11px;padding:1px 8px}
.kcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px;cursor:grab}
.kcard:hover{border-color:var(--brand-tint2)}
.kcard b{font-size:12.5px;display:block;line-height:1.35}
.kcard .kb-meta{font-size:11px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}

/* file cards */
.file-grid{grid-template-columns:repeat(3,1fr)}
.file{padding:15px;display:flex;gap:13px;align-items:flex-start}
.file .fic{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:18px;color:#fff;flex-shrink:0;font-weight:700}
.file h4{margin:0 0 3px;font-size:13.5px;font-weight:700;line-height:1.3}
.file .fmeta{font-size:11.5px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 9px;margin-top:5px}
.file .dl{margin-top:9px;font-size:12px;color:var(--brand);font-weight:600;background:none;border:0;padding:0;display:inline-flex;gap:5px}

/* wiki */
.wiki{grid-template-columns:200px 1fr;align-items:start;gap:20px}
.wiki-nav{position:sticky;top:90px}
.wiki-nav button{display:block;width:100%;text-align:left;border:0;background:none;padding:8px 12px;border-radius:9px;color:var(--muted);font-weight:500;font-size:13px}
.wiki-nav button.active{background:var(--brand-tint);color:var(--brand);font-weight:700}
.wiki-body{padding:24px 28px}
.wiki-body h2{margin:0 0 6px;font-size:18px}
.wiki-body h3{font-size:14px;margin:20px 0 8px}
.wiki-body p{color:#4a434f;margin:0 0 10px}
.flow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0}
.flow .step{background:var(--brand-tint);color:var(--brand-dark);font-weight:600;padding:7px 13px;border-radius:9px;font-size:12.5px}
.flow .arr{color:var(--muted)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(30,22,34,.5);backdrop-filter:blur(3px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.on{display:flex}
.modal{background:var(--surface);border-radius:18px;max-width:820px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);overflow:hidden;animation:pop .25s ease}
@keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-head{background:linear-gradient(135deg,var(--brand),#F0568F);color:#fff;padding:22px 26px;position:relative}
.modal-head h2{margin:0;font-size:20px;font-weight:800}
.modal-head .mh-meta{margin-top:6px;font-size:13px;opacity:.92;display:flex;flex-wrap:wrap;gap:6px 14px}
.modal-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.2);border:0;color:#fff;width:32px;height:32px;border-radius:9px;font-size:16px}
.modal-close:hover{background:rgba(255,255,255,.32)}
.modal-body{padding:24px 26px;display:grid;grid-template-columns:1.6fr 1fr;gap:24px}
.mb-section h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.mb-section p{margin:0 0 16px;font-size:13.5px;color:#3a343f}
.mtimeline{list-style:none;padding:0;margin:0 0 16px}
.mtimeline li{position:relative;padding:0 0 14px 22px;font-size:13px}
.mtimeline li:before{content:'';position:absolute;left:5px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--brand)}
.mtimeline li:after{content:'';position:absolute;left:9px;top:12px;bottom:0;width:2px;background:var(--brand-tint2)}
.mtimeline li:last-child:after{display:none}
.mgallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mgallery div{aspect-ratio:1;border-radius:9px;background:var(--brand-tint);display:grid;place-items:center;color:var(--brand);font-size:20px}
.side-box{background:var(--bg);border-radius:12px;padding:15px}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border);font-size:13px}
.kv:last-child{border:0}
.kv span{color:var(--muted)}
.kv b{font-weight:700}
.dl-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.dl-btn{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--ink)}
.dl-btn:hover{border-color:var(--brand);color:var(--brand)}

.hidden{display:none!important}
.demo-tag{position:fixed;bottom:16px;right:18px;background:var(--ink);color:#fff;font-size:11px;font-weight:600;padding:7px 13px;border-radius:20px;z-index:40;opacity:.9}

@media(max-width:1100px){.charts,.modal-body,.wiki{grid-template-columns:1fr}.proj-grid,.file-grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){.app{grid-template-columns:1fr}.sidebar{display:none}.proj-grid,.file-grid,.stats{grid-template-columns:1fr}}
</style>

/* ---------------- helpers ---------------- */
function opts(arr){return ['<option value="">Tất cả</option>'].concat(arr.map(a=>`<option>${a}</option>`)).join('')}
function statusChip(s){const c=STATUS_COLOR[s]||'--muted';return `<span class="chip" style="background:var(${c});color:#fff">${s}</span>`}
function coopChip(s){const c=s==='Đang hợp tác'?'--ok':s==='Tiềm năng'?'--warn':'--lost';return `<span class="chip" style="background:var(${c})1a;color:var(${c})">${s}</span>`}

 </tr>`).join('')||`<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">Không có kết quả.</td></tr>`;
}

/* ----- hcp ----- */
let cF={spec:'',region:'',fmt:''};
function renderHCP(){
 const specs=[...new Set(hcps.map(h=>h.spec))];
 const fmts=['Offline','Online','Livestream','Video','Workshop'];
 return `<div class="page-head"><div><h1>HCP Booking</h1><p>Bác sĩ & chuyên gia có thể booking cho chương trình.</p></div><button class="btn primary">＋ Thêm HCP</button></div>
 <div class="filters">
  <select onchange="cF.spec=this.value;paintHCP()">${opts(specs)}</select>
  <select onchange="cF.region=this.value;paintHCP()">${opts(regions)}</select>
  <select onchange="cF.fmt=this.value;paintHCP()">${opts(fmts)}</select>
  <span class="count-note" id="ccount"></span>
 </div>
 <div class="card tbl-wrap"><table>
  <thead><tr><th>HCP</th><th>Chuyên môn</th><th>Nơi công tác</th><th>Chủ đề</th><th>Hình thức</th><th>Chi phí</th><th>Đánh giá</th></tr></thead>
  <tbody id="hcprows"></tbody>
 </table></div>`;
}
function paintHCP(){
 const list=hcps.filter(h=>(!cF.spec||h.spec===cF.spec)&&(!cF.region||h.region===cF.region)&&(!cF.fmt||h.fmt.includes(cF.fmt)));
 document.getElementById('ccount').textContent=`${list.length} HCP`;
 document.getElementById('hcprows').innerHTML=list.map(h=>`<tr>
  <td class="hosp-name">${h.name}</td><td>${h.spec}</td><td>${h.work}<div class="mini">${h.region}</div></td>
  <td style="max-width:180px">${h.topics}</td>
  <td>${h.fmt.map(f=>`<span class="chip" style="background:var(--bg);color:var(--muted)">${f}</span>`).join(' ')}</td>
  <td><b>${h.cost}</b></td><td style="color:var(--warn);white-space:nowrap">${stars(h.rate)}</td>
 </tr>`).join('')||`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px">Không có kết quả.</td></tr>`;
}

/* ----- global search ----- */
function globalSearch(q){
 if(!q)return; q=q.toLowerCase();
 const hit=(arr,f)=>arr.some(x=>f(x).toLowerCase().includes(q));
 if(hit(projects,x=>x.name)) go('projects');
 else if(hit(hospitals,x=>x.name)) go('hospitals');
 else if(hit(hcps,x=>x.name)) go('hcp');
}
